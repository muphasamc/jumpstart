<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>jumpstart randomizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=IM+Fell+English+SC&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/mana-font@1.18.0/css/mana.min.css" rel="stylesheet">
<style>
:root{
  /* surfaces + ink */
  --bg:#0a0806;
  --ink:#f3e9d2;
  --ink-dim:#a8997a;
  --ink-bright:#d5c9af;
  /* accents */
  --gold:#c9a24a;
  --gold-bright:#f0c75c;
  --frame:#2a2218;
  --frame-2:#3a2f20;
  /* per-mtg-color tints */
  --c-white:#f5e7a0;
  --c-blue:#3b82f6;
  --c-black:#8b3fbf;
  --c-red:#dc2626;
  --c-green:#16a34a;
  --c-multi:linear-gradient(120deg,#f5e7a0 0%,#3b82f6 25%,#8b3fbf 50%,#dc2626 75%,#16a34a 100%);
  /* rarity badge palettes — common solid, rare/mythic gradients */
  --rarity-common:#9c8a6e;
  --rarity-rare-1:#f5d272;
  --rarity-rare-2:#c9a24a;
  --rarity-rare-3:#7a5e22;
  --rarity-mythic-1:#ffb84a;
  --rarity-mythic-2:#e85d2e;
  --rarity-mythic-3:#a02717;
  /* durations — design system scale; one-off literals near keyframes stay literal */
  --dur-instant:50ms;
  --dur-snap:150ms;
  --dur-normal:220ms;
  --dur-medium:260ms;
  --dur-settle:380ms;
  --dur-slow:850ms;
  /* easings */
  --ease-material:cubic-bezier(0.4,0,0.2,1);
  --ease-settle:cubic-bezier(0.22,0.61,0.36,1);
  /* spacing scale — applied only where literals match exactly */
  --space-xs:4px;
  --space-sm:8px;
  --space-md:12px;
  --space-lg:16px;
  --space-xl:20px;
  --space-2xl:28px;
  /* radius scale */
  --radius-sm:2px;
  --radius-md:4px;
  --radius-lg:6px;
  --radius-xl:14px;
  /* letter-spacing — tokens cover the most common; one-off scales stay literal */
  --ls-tight:0.01em;
  --ls-wide:0.2em;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}

body{
  font-family:'Cinzel',Georgia,serif;
  background:
    radial-gradient(ellipse at top,rgba(201,162,74,0.08),transparent 60%),
    radial-gradient(ellipse at bottom,rgba(139,63,191,0.06),transparent 60%),
    var(--bg);
  color:var(--ink);
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}
body::before{
  content:"";
  position:fixed;inset:0;
  background-image:
    repeating-linear-gradient(0deg,transparent 0 2px,rgba(255,255,255,0.012) 2px 3px),
    repeating-linear-gradient(90deg,transparent 0 2px,rgba(255,255,255,0.012) 2px 3px);
  pointer-events:none;
  z-index:1;
}
/* ambient tint — 4 layers (2 per side), cross-fade between them on color change.
   each layer carries one color via data-color (CSS-only). on change: idle layer
   gets the new color + data-active, active layer loses data-active, both transition
   opacity simultaneously → true cross-fade with no flat moment in the middle. */
.tint-layer{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1;
  opacity:0;
  background:transparent;
  transition: opacity var(--dur-slow) var(--ease-material);
}
.tint-layer[data-active]{opacity:1}

/* LEFT side — gradient centered at 25% horizontal, 3-stop decay (center → mid → edge)
   for a more material falloff than a 2-stop linear fade. */
.tint-layer.is-left[data-color="white"]{
  background:radial-gradient(ellipse 62% 78% at 25% 35%,
    rgba(245,231,160,0.46) 0%,
    rgba(245,231,160,0.18) 35%,
    transparent 72%);
}
.tint-layer.is-left[data-color="blue"]{
  background:radial-gradient(ellipse 62% 78% at 25% 35%,
    rgba(59,130,246,0.52) 0%,
    rgba(59,130,246,0.20) 35%,
    transparent 72%);
}
.tint-layer.is-left[data-color="black"]{
  background:radial-gradient(ellipse 62% 78% at 25% 35%,
    rgba(139,63,191,0.54) 0%,
    rgba(139,63,191,0.22) 35%,
    transparent 72%);
}
.tint-layer.is-left[data-color="red"]{
  background:radial-gradient(ellipse 62% 78% at 25% 35%,
    rgba(220,38,38,0.46) 0%,
    rgba(220,38,38,0.18) 35%,
    transparent 72%);
}
.tint-layer.is-left[data-color="green"]{
  background:radial-gradient(ellipse 62% 78% at 25% 35%,
    rgba(22,163,74,0.46) 0%,
    rgba(22,163,74,0.18) 35%,
    transparent 72%);
}
.tint-layer.is-left[data-color="multicolor"]{
  background:radial-gradient(ellipse 62% 78% at 25% 35%,
    rgba(201,162,74,0.40) 0%,
    rgba(201,162,74,0.16) 35%,
    transparent 72%);
}

/* RIGHT side — same colors, gradient centered at 75% horizontal */
.tint-layer.is-right[data-color="white"]{
  background:radial-gradient(ellipse 62% 78% at 75% 35%,
    rgba(245,231,160,0.46) 0%,
    rgba(245,231,160,0.18) 35%,
    transparent 72%);
}
.tint-layer.is-right[data-color="blue"]{
  background:radial-gradient(ellipse 62% 78% at 75% 35%,
    rgba(59,130,246,0.52) 0%,
    rgba(59,130,246,0.20) 35%,
    transparent 72%);
}
.tint-layer.is-right[data-color="black"]{
  background:radial-gradient(ellipse 62% 78% at 75% 35%,
    rgba(139,63,191,0.54) 0%,
    rgba(139,63,191,0.22) 35%,
    transparent 72%);
}
.tint-layer.is-right[data-color="red"]{
  background:radial-gradient(ellipse 62% 78% at 75% 35%,
    rgba(220,38,38,0.46) 0%,
    rgba(220,38,38,0.18) 35%,
    transparent 72%);
}
.tint-layer.is-right[data-color="green"]{
  background:radial-gradient(ellipse 62% 78% at 75% 35%,
    rgba(22,163,74,0.46) 0%,
    rgba(22,163,74,0.18) 35%,
    transparent 72%);
}
.tint-layer.is-right[data-color="multicolor"]{
  background:radial-gradient(ellipse 62% 78% at 75% 35%,
    rgba(201,162,74,0.40) 0%,
    rgba(201,162,74,0.16) 35%,
    transparent 72%);
}

/* fx canvas — sits on top, never blocks interaction */
#fx-canvas{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:99;
}

/* ===== atmos: blurred-blob ambient texture layered UNDER the tints =====
   sits at z-index:0 (above body bg, below body::before grid + tint-layer).
   2 layers per side (left/right) cross-fade exactly like tints, so on slot
   change the idle layer gets the new color+archetype and fades in.
   each layer hosts 4 .blob children that share one archetype keyframe but
   carry per-blob --dur-mult and --delay vars so the 4 motions never sync.
   color comes from --c1/--c2/--c3 (set by [data-color]). archetype dictates
   motion (set by [data-archetype]). */
/* atmos tuning — final values dialed via the debug panel. lives on :root
   so it survives removing the debug block. the per-property `var(.., fallback)`
   reads below cover the case where someone wipes these too. */
:root{
  --atmos-blur:90px;
  --atmos-speed:1.09;
  --atmos-opa:0.56;
  --atmos-blend:overlay;
}
.atmos{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  opacity:0;
  overflow:hidden;
  transition: opacity var(--dur-slow) var(--ease-material);
  /* baseline palette = neutral gold so the first frame is never empty */
  --c1: rgba(201,162,74,0.35);
  --c2: rgba(245,231,160,0.30);
  --c3: rgba(240,200,92,0.22);
}
.atmos[data-active]{opacity: var(--atmos-opa, 1)}
.atmos .blob{
  position:absolute;
  width:55vw;
  height:55vw;
  border-radius:50%;
  filter:blur(var(--atmos-blur, 90px));
  mix-blend-mode: var(--atmos-blend, screen);
  will-change:transform;
  pointer-events:none;
}
.atmos.is-paused .blob{animation-play-state: paused}
/* horizontal anchoring per side — blobs slightly off-screen on the outside
   so the visible portion is always the diffuse falloff, never the hard center */
.atmos.is-left  .blob{ left:-18vw; }
.atmos.is-right .blob{ right:-18vw; }
/* vertical seeding — 4 blobs spread top→bottom so the lateral feels filled */
.atmos .b1{ top:-12vh; --delay:0s;   --dur-mult:1.00; }
.atmos .b2{ top:18vh;  --delay:-4s;  --dur-mult:0.82; }
.atmos .b3{ top:46vh;  --delay:-9s;  --dur-mult:1.21; }
.atmos .b4{ top:72vh;  --delay:-2s;  --dur-mult:0.94; }
/* color sources — 4 blobs rotate through the 3 palette stops */
.atmos .b1{ background: radial-gradient(circle, var(--c1) 0%, transparent 62%); }
.atmos .b2{ background: radial-gradient(circle, var(--c2) 0%, transparent 62%); }
.atmos .b3{ background: radial-gradient(circle, var(--c3) 0%, transparent 62%); }
.atmos .b4{ background: radial-gradient(circle, var(--c1) 0%, transparent 62%); }

/* palettes per mtg color — slightly stronger alphas than the tints because
   the blur dilutes saturation. each palette has a brighter primary, a mid,
   and a desaturated tertiary so the cross-blob mix reads as gradient depth */
.atmos[data-color="white"]{
  --c1: rgba(245,231,160,0.55);
  --c2: rgba(255,224,150,0.45);
  --c3: rgba(255,247,205,0.35);
}
.atmos[data-color="blue"]{
  --c1: rgba(59,130,246,0.60);
  --c2: rgba(103,232,249,0.45);
  --c3: rgba(125,211,252,0.40);
}
.atmos[data-color="black"]{
  --c1: rgba(139,63,191,0.65);
  --c2: rgba(88,28,135,0.55);
  --c3: rgba(168,85,247,0.45);
}
.atmos[data-color="red"]{
  --c1: rgba(220,38,38,0.60);
  --c2: rgba(249,115,22,0.55);
  --c3: rgba(254,202,202,0.35);
}
.atmos[data-color="green"]{
  --c1: rgba(22,163,74,0.55);
  --c2: rgba(34,197,94,0.45);
  --c3: rgba(132,204,22,0.38);
}
.atmos[data-color="multicolor"]{
  --c1: rgba(201,162,74,0.50);
  --c2: rgba(240,199,92,0.40);
  --c3: rgba(120,90,40,0.30);
}

/* archetype motions — one keyframe each, applied to all 4 blobs in the layer.
   per-blob --dur-mult/--delay desync them so the loop never reads as periodic.
   keyframes deliberately avoid touching opacity (the parent layer handles
   visibility via [data-active]) and stay GPU-friendly (transform only). */
.atmos[data-archetype="sky"]      .blob{ animation: atmos-sky      calc(28s * var(--dur-mult) / var(--atmos-speed, 1)) ease-in-out infinite var(--delay); }
.atmos[data-archetype="fire"]     .blob{ animation: atmos-fire     calc(9s  * var(--dur-mult) / var(--atmos-speed, 1)) ease-in-out infinite var(--delay); }
.atmos[data-archetype="undead"]   .blob{ animation: atmos-undead   calc(34s * var(--dur-mult) / var(--atmos-speed, 1)) linear      infinite var(--delay); }
.atmos[data-archetype="aquatic"]  .blob{ animation: atmos-aquatic  calc(22s * var(--dur-mult) / var(--atmos-speed, 1)) ease-in-out infinite var(--delay); }
.atmos[data-archetype="wild"]     .blob{ animation: atmos-wild     calc(17s * var(--dur-mult) / var(--atmos-speed, 1)) ease-in-out infinite var(--delay); }
.atmos[data-archetype="arcane"]   .blob{ animation: atmos-arcane   calc(30s * var(--dur-mult) / var(--atmos-speed, 1)) linear      infinite var(--delay); }
.atmos[data-archetype="metal"]    .blob{ animation: atmos-metal    calc(13s * var(--dur-mult) / var(--atmos-speed, 1)) ease-in-out infinite var(--delay); }
.atmos[data-archetype="chaos"]    .blob{ animation: atmos-chaos    calc(15s * var(--dur-mult) / var(--atmos-speed, 1)) ease-in-out infinite var(--delay); }
.atmos[data-archetype="default"]  .blob{ animation: atmos-default  calc(24s * var(--dur-mult) / var(--atmos-speed, 1)) ease-in-out infinite var(--delay); }

/* sky — slow upward float with gentle horizontal sway → angels, clouds */
@keyframes atmos-sky{
  0%   { transform: translate3d(0,18vh,0)     scale(0.92); }
  50%  { transform: translate3d(4vw,-6vh,0)   scale(1.10); }
  100% { transform: translate3d(-2vw,-22vh,0) scale(0.95); }
}
/* fire — quick flicker, vertical jitter, breathing scale → dragons, goblins */
@keyframes atmos-fire{
  0%   { transform: translate3d(0,6vh,0)     scale(0.85); }
  18%  { transform: translate3d(-1vw,2vh,0)  scale(1.08); }
  37%  { transform: translate3d(2vw,-4vh,0)  scale(0.95); }
  55%  { transform: translate3d(-1vw,-10vh,0)scale(1.18); }
  74%  { transform: translate3d(1vw,-6vh,0)  scale(0.90); }
  100% { transform: translate3d(0,6vh,0)     scale(0.85); }
}
/* undead — heavy horizontal drift, slow respiration → vampires, swamp rot */
@keyframes atmos-undead{
  0%   { transform: translate3d(-12vw,0,0)   scale(1.05); }
  50%  { transform: translate3d(8vw,4vh,0)   scale(1.22); }
  100% { transform: translate3d(-12vw,0,0)   scale(1.05); }
}
/* aquatic — long sinusoidal wave → pirates, merfolk, of-the-coast */
@keyframes atmos-aquatic{
  0%   { transform: translate3d(0,0,0)        scale(1.00); }
  25%  { transform: translate3d(6vw,-2vh,0)   scale(1.12); }
  50%  { transform: translate3d(0,-4vh,0)     scale(1.00); }
  75%  { transform: translate3d(-6vw,-2vh,0)  scale(1.12); }
  100% { transform: translate3d(0,0,0)        scale(1.00); }
}
/* wild — organic erratic jitter → elves, beasts, spiders, dinosaurs */
@keyframes atmos-wild{
  0%   { transform: translate3d(0,0,0)       scale(0.95); }
  17%  { transform: translate3d(3vw,-5vh,0)  scale(1.12); }
  34%  { transform: translate3d(-2vw,1vh,0)  scale(0.90); }
  51%  { transform: translate3d(5vw,4vh,0)   scale(1.15); }
  68%  { transform: translate3d(-4vw,-2vh,0) scale(0.98); }
  85%  { transform: translate3d(1vw,5vh,0)   scale(0.94); }
  100% { transform: translate3d(0,0,0)       scale(0.95); }
}
/* arcane — slow orbital rotation → wizards, urza's, spellcasting */
@keyframes atmos-arcane{
  0%   { transform: rotate(0deg)   translate3d(8vw,0,0) scale(1.00); }
  50%  { transform: rotate(180deg) translate3d(10vw,0,0) scale(1.15); }
  100% { transform: rotate(360deg) translate3d(8vw,0,0) scale(1.00); }
}
/* metal — disciplined rhythmic pulse → knights, armored, legion */
@keyframes atmos-metal{
  0%   { transform: translate3d(0,0,0)       scale(1.00); }
  50%  { transform: translate3d(2vw,-2vh,0)  scale(1.10); }
  100% { transform: translate3d(0,0,0)       scale(1.00); }
}
/* chaos — wide unpredictable swings → rainbow, multi-headed, treasures */
@keyframes atmos-chaos{
  0%   { transform: translate3d(0,0,0)        scale(0.92); }
  20%  { transform: translate3d(10vw,-8vh,0)  scale(1.20); }
  40%  { transform: translate3d(-7vw,5vh,0)   scale(0.85); }
  60%  { transform: translate3d(13vw,-3vh,0)  scale(1.12); }
  80%  { transform: translate3d(-10vw,9vh,0)  scale(0.97); }
  100% { transform: translate3d(0,0,0)        scale(0.92); }
}
/* default — generic smooth drift, used when no archetype keyword matches */
@keyframes atmos-default{
  0%   { transform: translate3d(0,0,0)      scale(1.00); }
  50%  { transform: translate3d(4vw,-4vh,0) scale(1.10); }
  100% { transform: translate3d(0,0,0)      scale(1.00); }
}

.shell{
  position:relative;
  z-index:2;
  max-width:1800px;
  margin:0 auto;
  padding:var(--space-lg) 32px var(--space-xl);
}

/* INITIAL STAGE */
.stage-initial{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:calc(100vh - var(--space-lg) - var(--space-xl));
  gap:48px;
}

/* hero mosaic: the 46 signature arts laid out as a tileable 9×7 block,
   doubled to 18×14 so a slow diagonal translate3d loops seamlessly.
   donut-shaped mask hides the center (lets the title pop) and fades the
   outer edges (no hard cut). track size + origin keep the viewport fully
   covered at every animation frame up to ~1920×1080. */
.hero-mosaic{
  /* fixed (not absolute): escapes the .shell max-width so the mosaic
     reaches the actual viewport edges. parent stage-initial uses
     display:none on .hidden, which also removes this from render. */
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  overflow:hidden;
  opacity:0.28;
  mask-image:radial-gradient(ellipse 80% 75% at center,
    transparent 0%,
    transparent 22%,
    rgba(0,0,0,0.45) 34%,
    #000 50%,
    #000 60%,
    rgba(0,0,0,0.4) 82%,
    transparent 100%);
  -webkit-mask-image:radial-gradient(ellipse 80% 75% at center,
    transparent 0%,
    transparent 22%,
    rgba(0,0,0,0.45) 34%,
    #000 50%,
    #000 60%,
    rgba(0,0,0,0.4) 82%,
    transparent 100%);
}
.hero-mosaic-track{
  position:absolute;
  top:-540px;
  left:-440px;
  width:max-content;
  display:grid;
  grid-template-columns:repeat(18,320px);
  grid-auto-rows:240px;
  animation:mosaicDrift 180s linear infinite;
  will-change:transform;
}
.hero-mosaic-track img{
  width:320px;
  height:240px;
  object-fit:cover;
  display:block;
  filter:saturate(0.7) brightness(0.7) contrast(1.05);
}
/* period equals one base block (9*320 = 2880, 7*240 = 1680); the doubled
   layout makes the end frame identical to the start → invisible loop. */
@keyframes mosaicDrift{
  from { transform: translate3d(0,0,0); }
  to   { transform: translate3d(-2880px,-1680px,0); }
}
.stage-initial > .bigtitle,
.stage-initial > .roll-btn{ position:relative; z-index:1; }
.bigtitle{
  font-family:'Cinzel',serif;
  font-weight:900;
  font-size:clamp(72px,11vw,160px);
  line-height:0.9;
  text-align:center;
  letter-spacing:0.02em;
  background:linear-gradient(180deg,#f0c75c 0%,#c9a24a 50%,#7a5d24 100%);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 80px rgba(201,162,74,0.2);
  filter:drop-shadow(0 4px 0 rgba(0,0,0,0.6));
}
.hero-blurb{
  position:relative;
  z-index:1;
  font-family:'JetBrains Mono',monospace;
  font-size:15px;
  line-height:1.75;
  letter-spacing:0.04em;
  color:var(--ink-dim);
  text-align:center;
  max-width:680px;
  margin:-16px auto 0;
}
.hero-blurb b, .hero-blurb strong{ color:var(--ink-bright); font-weight:700; }

/* PRODUCT SELECTOR — three chips on the home stage. inactive chip reads dim
   gold; active chip flips to filled gold with the badge inverted. compact so
   it doesn't compete with the title for visual weight. */
.product-selector{
  position:relative;
  z-index:1;
  display:flex;
  gap:var(--space-md);
  margin:-12px auto 0;
  flex-wrap:wrap;
  justify-content:center;
}
.product-btn{
  font-family:'Cinzel',serif;
  background:rgba(10,8,6,0.55);
  border:1px solid var(--frame-2);
  border-radius:var(--radius-md);
  padding:10px 18px 8px;
  display:inline-flex;
  flex-direction:column;
  align-items:center;
  gap:2px;
  cursor:pointer;
  color:var(--ink-dim);
  backdrop-filter:blur(6px) saturate(140%);
  -webkit-backdrop-filter:blur(6px) saturate(140%);
  transition: border-color var(--dur-medium) var(--ease-material),
              color var(--dur-medium) var(--ease-material),
              background var(--dur-medium) var(--ease-material),
              transform 80ms cubic-bezier(0.4,0,0.2,1),
              box-shadow var(--dur-medium) var(--ease-material);
  min-width:140px;
}
.product-btn:hover{
  border-color: color-mix(in srgb, var(--gold) 50%, var(--frame-2));
  color:var(--ink-bright);
}
.product-btn:active{ transform:translateY(1px); }
.product-btn .product-badge{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  letter-spacing:0.3em;
  color:var(--gold);
  text-transform:uppercase;
  line-height:1;
}
.product-btn .product-label{
  font-size:15px;
  font-weight:700;
  letter-spacing:0.05em;
  text-transform:uppercase;
  line-height:1.15;
}
.product-btn .product-year{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  letter-spacing:0.25em;
  color:var(--ink-dim);
  line-height:1;
}
.product-btn.active{
  border-color:var(--gold);
  background:linear-gradient(180deg,rgba(201,162,74,0.18),rgba(201,162,74,0.08));
  color:var(--gold-bright);
  box-shadow:
    inset 0 0 0 1px rgba(0,0,0,0.45),
    0 0 32px rgba(201,162,74,0.22),
    0 0 0 1px rgba(0,0,0,0.5) inset;
}
.product-btn.active .product-badge{ color:var(--gold-bright); }
.product-btn.active .product-label{ color:#fff5d6; }
.product-btn.active .product-year{ color:var(--gold); }
.product-btn[aria-pressed="true"]::after{
  /* tiny gold dot in the upper-right corner so multi-select feels intentional
     (not just "this one is highlighted"). hidden on inactive chips. */
  content:"";
  position:absolute;
  top:6px;
  right:6px;
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--gold-bright);
  box-shadow:0 0 6px var(--gold-bright);
}
.product-btn{ position:relative; }

.roll-btn{
  font-family:'Cinzel',serif;
  font-weight:900;
  font-size:48px;
  letter-spacing:0.12em;
  padding:28px 96px;
  background:linear-gradient(180deg,#1a1410 0%,#0a0806 100%);
  color:var(--gold-bright);
  border:2px solid var(--gold);
  border-radius:var(--radius-md);
  cursor:pointer;
  position:relative;
  text-transform:uppercase;
  box-shadow:
    inset 0 0 0 1px rgba(0,0,0,0.5),
    inset 0 0 40px rgba(201,162,74,0.15),
    0 0 0 1px rgba(0,0,0,0.5) inset,
    0 8px 24px rgba(0,0,0,0.6),
    0 0 80px rgba(201,162,74,0.2);
  transition:transform var(--dur-snap) ease,box-shadow .25s ease,color var(--dur-snap) ease;
}
.roll-btn::before,.roll-btn::after{
  content:"";
  position:absolute;
  width:14px;height:14px;
  border:1px solid var(--gold);
}
.roll-btn::before{top:6px;left:6px;border-right:none;border-bottom:none}
.roll-btn::after{bottom:6px;right:6px;border-left:none;border-top:none}
.roll-btn:hover{
  color:#fff5d6;
  transform:translateY(-2px);
  box-shadow:
    inset 0 0 0 1px rgba(0,0,0,0.5),
    inset 0 0 60px rgba(240,199,92,0.25),
    0 10px 32px rgba(0,0,0,0.7),
    0 0 120px rgba(240,199,92,0.35);
}
.roll-btn:active{
  transform:translateY(1px);
  transition:transform var(--dur-instant) linear, box-shadow var(--dur-instant) linear;
  box-shadow:
    inset 0 4px 12px rgba(0,0,0,0.7),
    inset 0 0 30px rgba(201,162,74,0.1),
    0 2px 8px rgba(0,0,0,0.5),
    0 0 40px rgba(201,162,74,0.15);
}

/* REVEAL STAGE */
.stage-reveal{display:none}
/* matches the visual gap the old header used to reserve, so the packs
   don't sit flush against the top of the viewport. */
.stage-reveal.active{display:block;padding-top:68px}

.packs{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:var(--space-xl);
  margin-bottom:var(--space-lg);
}

.pack{
  --c:#888;
  --emblem-bg:none;
  position:relative;
  isolation:isolate;
  background: rgba(19,16,12,0.72);
  border:1px solid var(--frame-2);
  border-radius:var(--radius-lg);
  padding:var(--space-xl) var(--space-2xl) 18px;
  overflow:hidden;
  min-height:180px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  transition: border-color var(--dur-medium) var(--ease-material),
              box-shadow var(--dur-medium) var(--ease-material);
}
/* art layer sits behind text. ::before is the animated image, ::after is the
   static dark overlay that keeps text legible. z-index:-1 keeps it behind
   flow content without escaping the .pack stacking context (overflow:hidden) */
.pack-art{
  position:absolute;
  inset:0;
  z-index:-1;
  pointer-events:none;
  overflow:hidden;
  opacity:1;
  transition: opacity 0.2s ease-out;
}
.pack.rolling .pack-art{ opacity:0; }
.pack-art::before{
  content:"";
  position:absolute;
  top:-5%; bottom:-20%; right:-5%;  /* extra bottom slack so upward translate doesn't gap */
  left:30%;  /* image area covers right 70% of card */
  background: var(--emblem-bg) center/cover no-repeat;
  /* mask fades the image's left edge so the cut blends instead of cutting hard */
  -webkit-mask-image: linear-gradient(90deg, transparent 0%, #000 25%, #000 100%);
          mask-image: linear-gradient(90deg, transparent 0%, #000 25%, #000 100%);
  /* base state matches emblemEntry's end frame so removing data-color at
     roll-start doesn't snap the image back to translateY(0). the transition
     smooths the case where reroll fires mid-animation. */
  transform: translateY(0);
  transition: transform 0.2s ease-out;
}
.pack-art::after{
  content:"";
  position:absolute;
  inset:0;
  /* gradient overlays the text area heavy and fades over the masked edge zone */
  background: linear-gradient(90deg,
    rgba(10,8,6,0.94) 0%,
    rgba(10,8,6,0.82) 28%,
    rgba(10,8,6,0.35) 48%,
    rgba(10,8,6,0) 65%);
}
/* re-triggers each settle: data-color removed at roll-start resets the rule.
   end state mirrors the .pack-art::before base transform so reroll
   mid-animation doesn't snap. will-change scoped to [data-color] so the
   compositor layer releases when the attribute is stripped at roll-start. */
.pack[data-color] .pack-art::before{
  animation: emblemEntry 3.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  will-change: transform, filter;
}
@keyframes emblemEntry{
  0%   { transform: scale(1.1) translateY(-21%); filter: blur(2px) brightness(1.1); }
  100% { transform: scale(1) translateY(0); filter: blur(0) brightness(1); }
}
.pack::before{
  content:"";
  position:absolute;inset:0;
  background:var(--c);
  opacity:0.08;
  pointer-events:none;
  z-index:0;
}
.pack::after{
  content:"";
  position:absolute;
  top:0;left:0;right:0;height:6px;
  background:var(--c);
  box-shadow:0 0 30px var(--c);
  transition: box-shadow var(--dur-medium) var(--ease-material),
              height var(--dur-medium) var(--ease-material);
}
.pack:hover{
  border-color: color-mix(in srgb, var(--c) 35%, var(--frame-2));
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.pack:hover::after{
  box-shadow: 0 0 48px var(--c), 0 0 18px var(--c);
}
.pack.multi::after{background:var(--c-multi)}
.pack > *:not(.pack-art){position:relative;z-index:1}

.pack-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:var(--space-lg);
  margin-bottom:var(--space-md);
}
.pack-label{
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  letter-spacing:0.3em;
  color:var(--ink-dim);
  text-transform:uppercase;
}
.pack-color-tag{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  letter-spacing:0.25em;
  /* inline-flex so min-height applies; align-items centers the text.
     23px ≈ filled rendered height (11px font + 4×2 padding + 1×2 border).
     reserved so empty (rolling) state matches filled height — without it,
     when both packs roll the grid row's stretch anchor shrinks. */
  display:inline-flex;
  align-items:center;
  min-height:23px;
  padding:4px 10px;
  border:1px solid var(--c);
  color:var(--c);
  text-transform:uppercase;
  border-radius:var(--radius-sm);
  /* frosted backdrop so the colored text/border reads over busy art */
  background:rgba(10,8,6,0.55);
  backdrop-filter:blur(6px) saturate(140%);
  -webkit-backdrop-filter:blur(6px) saturate(140%);
  text-shadow:0 0 8px rgba(0,0,0,0.7);
}
.pack.multi .pack-color-tag{
  background:var(--c-multi);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  border-image:linear-gradient(90deg,#f5e7a0,#3b82f6,#8b3fbf,#dc2626,#16a34a) 1;
}
.pack-head-right{
  display:inline-flex;
  align-items:center;
  gap:10px;
}
/* shape encodes rarity: common circle, rare diamond, mythic square */
.pack-rarity{
  display:inline-block;
  width:11px;
  height:11px;
  flex-shrink:0;
  opacity:0;
  transition:opacity var(--dur-normal) ease, transform var(--dur-normal) ease;
}
.pack-rarity[data-rarity]{opacity:1}
.pack-rarity[data-rarity="common"]{
  border-radius:50%;
  background:var(--rarity-common);
  box-shadow:
    0 0 0 1.5px rgba(0,0,0,0.75),
    0 0 7px rgba(156,138,110,0.55),
    inset 0 1px 1px rgba(255,255,255,0.25),
    inset 0 0 2px rgba(0,0,0,0.4);
}
.pack-rarity[data-rarity="rare"]{
  transform:rotate(45deg);
  background:linear-gradient(135deg,var(--rarity-rare-1),var(--rarity-rare-2) 55%,var(--rarity-rare-3));
  box-shadow:
    0 0 0 1.5px rgba(0,0,0,0.75),
    0 0 9px rgba(245,210,114,0.7),
    inset 0 1px 1px rgba(255,255,255,0.35),
    inset 0 0 2px rgba(0,0,0,0.3);
}
.pack-rarity[data-rarity="mythic"]{
  background:linear-gradient(135deg,var(--rarity-mythic-1),var(--rarity-mythic-2) 55%,var(--rarity-mythic-3));
  box-shadow:
    0 0 0 1.5px rgba(0,0,0,0.75),
    0 0 11px rgba(232,93,46,0.8),
    inset 0 1px 1px rgba(255,255,255,0.35),
    inset 0 0 2px rgba(0,0,0,0.35);
}

.pack-name{
  font-family:'Cinzel',serif;
  font-weight:900;
  font-size:clamp(40px,4.2vw,68px);
  line-height:0.9;
  letter-spacing:var(--ls-tight);
  color:#fff;
  text-shadow:
    0 0 40px var(--c),
    0 0 8px rgba(0,0,0,0.8);
  text-transform:uppercase;
  margin-bottom:10px;
  /* reserve space for 2 lines so single-line names don't shrink the card —
     avoids vertical jump during the roll when neighbouring packs wrap differently */
  min-height:1.8em;
}
.pack-meta{
  font-family:'JetBrains Mono',monospace;
  font-size:13px;
  color:var(--ink-bright);
  letter-spacing:0.05em;
  line-height:1.4;
  /* reserve one line so rolling (text cleared) doesn't collapse layout */
  min-height:1lh;
  max-width:640px;
}

.pack-actions{
  margin-top:14px;
  display:flex;
  gap:10px;
}
.pack-btn{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  letter-spacing:0.25em;
  padding:8px 14px;
  background:transparent;
  border:1px solid var(--frame-2);
  color:var(--ink-dim);
  cursor:pointer;
  text-transform:uppercase;
  border-radius:var(--radius-sm);
  transition: border-color 180ms cubic-bezier(0.4,0,0.2,1),
              color 180ms cubic-bezier(0.4,0,0.2,1),
              background 180ms cubic-bezier(0.4,0,0.2,1),
              transform 80ms cubic-bezier(0.4,0,0.2,1),
              box-shadow 80ms cubic-bezier(0.4,0,0.2,1);
}
.pack-btn:hover{
  border-color:var(--gold);
  color:var(--gold-bright);
}
.pack-btn:active{
  transform:translateY(1px);
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.5);
}
.pack-btn.locked{
  border-color:var(--gold-bright);
  color:var(--bg);
  background:var(--gold-bright);
}
.pack-btn.locked:active{
  transform:translateY(1px);
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.3);
}

/* SLOT REEL animation */
.pack.rolling .pack-name{
  animation:reelShake 0.06s steps(2) infinite;
}
/* hide the color-tag chrome (border+padding) and rarity glyph while rolling
   so only the name flickers — empty text alone leaves an empty bordered box */
.pack.rolling .pack-color-tag,
.pack.rolling .pack-rarity{
  opacity:0;
}
@keyframes reelShake{
  0%{transform:translateY(0) }
  50%{transform:translateY(4px)}
  100%{transform:translateY(0)}
}

/* SWEEP on the color stripe — left to right wipe at settle */
.pack .sweep{
  position:absolute;
  top:0;left:0;height:6px;
  width:100%;
  pointer-events:none;
  z-index:2;
  transform-origin:left center;
  transform:scaleX(0);
  background:linear-gradient(90deg,
    transparent 0%,
    rgba(255,255,255,0.85) 50%,
    transparent 100%);
  mix-blend-mode:screen;
}
.pack.settling .sweep{
  animation:sweepLine var(--dur-medium) var(--ease-settle) forwards;
}
@keyframes sweepLine{
  0%  {transform:scaleX(0); opacity:0}
  20% {opacity:1}
  100%{transform:scaleX(1); opacity:0}
}

/* content fade-in after sweep */
.pack.settling .pack-name,
.pack.settling .pack-meta{
  animation:contentIn var(--dur-normal) var(--ease-material) 200ms both;
}
@keyframes contentIn{
  0%  {opacity:0; transform:translateY(4px)}
  100%{opacity:1; transform:translateY(0)}
}

/* subtle settle pulse on the pack itself — no bounce */
.pack.settle{
  animation:settle var(--dur-settle) var(--ease-settle);
}
@keyframes settle{
  0%  {filter:brightness(1.25)}
  100%{filter:brightness(1)}
}

/* COMBINED LIST */
.combined{
  border:1px solid var(--frame-2);
  background:linear-gradient(180deg,rgba(255,255,255,0.012),transparent),rgba(19,16,12,0.65);
  border-radius:var(--radius-lg);
  padding:14px 24px 16px;
  opacity:0;
  transform:translateY(12px);
  transition:opacity .4s ease,transform .4s ease;
  pointer-events:none;  /* stale list never accepts hover/clicks while hidden */
}
.combined.show{opacity:1;transform:translateY(0);pointer-events:auto}

.combined-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  margin-bottom:10px;
  padding-bottom:var(--space-sm);
  border-bottom:1px solid var(--frame);
  flex-wrap:wrap;
  gap:var(--space-lg);
}
.combined-head-left{
  display:flex;
  align-items:baseline;
  gap:var(--space-lg);
  flex-wrap:wrap;
}
.combined-head-right{
  display:flex;
  align-items:flex-end;
  gap:18px;
}
.combined-title{
  font-family:'IM Fell English SC',serif;
  font-size:32px;
  letter-spacing:0.1em;
  color:var(--gold);
}
.combined-count{
  font-family:'JetBrains Mono',monospace;
  font-size:13px;
  letter-spacing:var(--ls-wide);
  color:var(--ink-dim);
  text-transform:uppercase;
}
.deck-stats{
  display:flex;
  gap:14px;
  align-items:flex-end;
  padding-bottom:2px;
}
.stat-item{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:2px;
  font-family:'JetBrains Mono',monospace;
  line-height:1;
}
.stat-label{
  font-size:9px;
  letter-spacing:var(--ls-wide);
  color:var(--ink-dim);
  text-transform:uppercase;
}
.stat-value{
  font-size:15px;
  font-weight:700;
  color:var(--ink);
}
/* mana curve — compact stacked bars, creatures (gold) on bottom, spells (dim) on top */
.mana-curve{
  display:flex;
  align-items:flex-end;
  gap:3px;
  height:64px;
}
.curve-col{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
  width:22px;
  height:100%;
}
.curve-count{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  font-weight:700;
  color:var(--ink);
  line-height:1;
  min-height:11px;
}
.curve-stack{
  width:14px;
  flex:1;
  display:flex;
  flex-direction:column-reverse;
  background:rgba(168,153,122,0.10);
  border-radius:1.5px;
  overflow:hidden;
}
.curve-creature{ background:var(--gold); width:100%; }
.curve-spell{ background:var(--ink-dim); width:100%; opacity:0.55; }
.curve-label{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;
  color:var(--ink-dim);
  line-height:1;
}

.card-grid{
  column-width:280px;
  column-gap:var(--space-2xl);
  margin-bottom:14px;
}
.card-row{
  display:grid;
  grid-template-columns:42px 1fr auto;
  gap:10px;
  font-family:'JetBrains Mono',monospace;
  font-size:14px;
  padding:3px 0;
  border-bottom:1px dotted rgba(168,153,122,0.12);
  align-items:baseline;
  break-inside:avoid;          /* keep a card row whole within its column */
  page-break-inside:avoid;     /* legacy fallback */
}
.card-qty{
  color:var(--gold-bright);
  font-weight:700;
  text-align:right;
}
.card-name{
  color:var(--ink);
  letter-spacing:var(--ls-tight);
}
.card-mana{
  display:inline-flex;
  gap:2px;
  font-size:15px;
  line-height:1;
  align-items:center;
}
.card-mana .ms{vertical-align:middle}
.card-mana .ms-cost{text-shadow:0 1px 1px rgba(0,0,0,0.5)}
.card-row.basic .card-name{color:var(--ink-dim);font-style:italic}

.action-bar{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
}
.action-btn{
  font-family:'Cinzel',serif;
  font-weight:700;
  font-size:16px;
  letter-spacing:0.18em;
  padding:var(--space-md) var(--space-2xl);
  background:transparent;
  border:1px solid var(--gold);
  color:var(--gold-bright);
  cursor:pointer;
  text-transform:uppercase;
  border-radius:3px;
  flex:1;
  min-width:240px;
  transition: background 180ms cubic-bezier(0.4,0,0.2,1),
              color 180ms cubic-bezier(0.4,0,0.2,1),
              border-color 180ms cubic-bezier(0.4,0,0.2,1),
              transform 80ms cubic-bezier(0.4,0,0.2,1),
              box-shadow 180ms cubic-bezier(0.4,0,0.2,1);
}
.action-btn:hover{
  background:var(--gold);
  color:var(--bg);
}
.action-btn:active{
  transform:translateY(1px);
  box-shadow: inset 0 3px 10px rgba(0,0,0,0.4);
}
.action-btn.primary{
  background:var(--gold);
  color:var(--bg);
}
.action-btn.primary:hover{
  background:var(--gold-bright);
  box-shadow:0 0 40px rgba(240,199,92,0.4);
}
.action-btn.primary:active{
  transform:translateY(1px);
  box-shadow: inset 0 3px 12px rgba(0,0,0,0.35),
              0 0 20px rgba(240,199,92,0.2);
}
.action-btn.copied{
  background:#16a34a;
  border-color:#16a34a;
  color:#fff;
}

/* color modifiers */
.pack[data-color="white"]{--c:var(--c-white)}
.pack[data-color="blue"]{--c:var(--c-blue)}
.pack[data-color="black"]{--c:var(--c-black)}
.pack[data-color="red"]{--c:var(--c-red)}
.pack[data-color="green"]{--c:var(--c-green)}
.pack[data-color="multicolor"]{--c:#c9a24a}

/* hide cards stage 0 */
.stage-initial.hidden{display:none}

/* HOVER CARD PREVIEW — floats near cursor, fades in once Scryfall image loads */
.card-row[data-set]{cursor:help}
#hover-preview{
  position:fixed;
  width:320px;
  height:auto;
  pointer-events:none;
  z-index:1000;
  border-radius:var(--radius-xl);
  box-shadow:
    0 20px 50px rgba(0,0,0,0.85),
    0 0 0 1px rgba(201,162,74,0.35),
    0 0 60px rgba(201,162,74,0.12);
  opacity:0;
  visibility:hidden;
  transition:opacity 140ms ease;
  background:#0a0806;  /* fallback while loading */
  aspect-ratio:488/680;
}
#hover-preview.show{visibility:visible}
#hover-preview.loaded{opacity:1}
/* a11y: motion-sensitive users — disable particle canvas, mosaic drift,
   reel/settle animations, tint cross-fade, and hover-preview fade. */
@media (prefers-reduced-motion: reduce){
  .tint-layer{transition:none}
  #fx-canvas{display:none}
  .hero-mosaic-track{animation:none}
  .pack[data-color] .pack-art::before{animation:none}
  .pack.rolling .pack-name{animation:none}
  .pack.settling .sweep{animation:none; opacity:0}
  .pack.settling .pack-name,
  .pack.settling .pack-meta{animation:none}
  .pack.settle{animation:none}
  #hover-preview{transition:none}
  .atmos{transition:none}
  .atmos .blob{animation:none}
}

/* ===== DEBUG: atmos panel — remove block on cleanup ===== */
body.dbg-hide-tints  .tint-layer{opacity:0 !important}
body.dbg-hide-mosaic .hero-mosaic{opacity:0 !important}
body.dbg-atmos-off   .atmos{opacity:0 !important}
#atmos-debug.hidden{display:none}
#atmos-debug{
  position:fixed;
  left:12px;
  bottom:12px;
  z-index:9999;
  background:rgba(10,8,6,0.92);
  border:1px solid var(--frame-2);
  border-radius:var(--radius-lg);
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:var(--ink);
  width:280px;
  backdrop-filter:blur(8px);
  user-select:none;
  box-shadow:0 8px 24px rgba(0,0,0,0.5);
}
#atmos-debug header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:6px 10px;
  border-bottom:1px solid var(--frame-2);
  cursor:pointer;
}
#atmos-debug header span{letter-spacing:0.2em;color:var(--gold);font-weight:700}
#atmos-debug header .ad-x{
  background:transparent;border:0;color:var(--ink-dim);
  font-family:inherit;font-size:14px;cursor:pointer;padding:0 4px;
}
#atmos-debug .ad-body{padding:8px 10px;display:flex;flex-direction:column;gap:6px}
#atmos-debug.collapsed .ad-body{display:none}
#atmos-debug .ad-row{display:flex;flex-direction:column;gap:3px}
#atmos-debug .ad-row > label{
  color:var(--ink-dim);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;
  display:flex;align-items:center;gap:6px;
}

/* resolve a card name within a specific set's data to {name, set, cn, mc, cmc, isCreature}.
   basics + JMP themed basics + the JMP "Rainbow Terramorphic Expanse" special case
   all collapse to their printable form here. used at parse time to bake the lookup
   into each card row, so consolidate()/renderDeckInsights() don't need a runtime
   dictionary — they just read flags off the card. */
function resolveCard(name, setCode){
  const setData = SETS[setCode] || {};
  const basics = setData.basics || {};
  const cardData = setData.cardData || {};
  const creatures = setData.creatures || new Set();
  if(basics[name] !== undefined) return { name, set:setCode, cn:String(basics[name]), mc:'', cmc:0, isCreature:false };
  // themed basic ("Angels Plains" → vanilla "Plains") only appears in JMP 2020
  for(const b of Object.keys(basics)){
    if(name.endsWith(' '+b)) return { name:b, set:setCode, cn:String(basics[b]), mc:'', cmc:0, isCreature:false };
  }
  if(name === 'Rainbow Terramorphic Expanse' && cardData['Terramorphic Expanse']){
    const d = cardData['Terramorphic Expanse'];
    return { name:'Terramorphic Expanse', set:d[0], cn:d[1], mc:'', cmc:0, isCreature:false };
  }
  const d = cardData[name];
  if(d) return { name, set:d[0], cn:d[1], mc:d[2], cmc:d[3], isCreature:creatures.has(name) };
  console.warn(`[resolveCard] "${name}" (${setCode}) sin lookup`);
  return { name, set:null, cn:null, mc:'', cmc:0, isCreature:false };
}

/* ========== PARSER · markdown → PACKS[] ==========
   logic mirrored in scripts/validate-data.mjs — keep both in sync when touching
   the format. each pack is tagged with its source set and pre-enriched with theme
   rarity, description, and emblem card; each card row is pre-resolved to its
   {set,cn,mc,cmc} so downstream code stays product-agnostic. */
function parseMarkdown(md, setCode){
  const setData = SETS[setCode] || {};
  const packRarity = setData.packRarity || {};
  const themeDescriptions = setData.themeDescriptions || {};
  const packEmblem = setData.packEmblem || {};
  const packs = [];
  const lines = md.split('\n');
  let currentColor = null;
  let currentPack = null;
  let inCode = false;
  for(const raw of lines){
    const line = raw.replace(/\r$/,'');
    if(line.startsWith('## ') && !line.startsWith('### ')){
      const head = line.slice(3).toLowerCase();
      for(const c of COLORS){ if(head.startsWith(c)){ currentColor = c; break; } }
      continue;
    }
    if(line.startsWith('### ')){
      const name = line.slice(4).trim();
      const m = name.match(/^(.+?)\s*\((\d+)\)\s*$/);
      const theme = m ? m[1].trim() : name;
      currentPack = {
        set: setCode,
        name,
        theme,
        color: currentColor,
        rarity: packRarity[theme] || null,
        description: themeDescriptions[theme] || '',
        emblemCard: packEmblem[name] || null,
        cards: [],
      };
      packs.push(currentPack);
      continue;
    }
    if(line.startsWith('```')){ inCode = !inCode; continue; }
    if(inCode && currentPack){
      const cm = line.match(/^(\d+)\s+(.+)$/);
      if(cm){
        const qty = parseInt(cm[1],10);
        const raw = cm[2].trim();
        const ex = resolveCard(raw, setCode);
        currentPack.cards.push({ qty, name: ex.name, set: ex.set, cn: ex.cn, mc: ex.mc, cmc: ex.cmc, isCreature: ex.isCreature, origName: raw });
      }
    }
  }
  return packs;
}

/* land detection on consolidate()'s output shape (flat .mc).
   note: consolidate's own internal isLand reads .m.mc (pre-flatten); kept local. */
function isLand(card){ return !card.mc; }

/* alternate two arrays a, b → [a0, b0, a1, b1, ...]; used for combined palettes */
function interleave(a, b){
  const out = [];
  const n = Math.max(a.length, b.length);
  for(let i = 0; i < n; i++){
    if(a[i % a.length]) out.push(a[i % a.length]);
    if(b[i % b.length]) out.push(b[i % b.length]);
  }
  return out;
}

class FX {
  constructor(canvasEl){
    this.c = canvasEl;
    this.ctx = canvasEl.getContext('2d');
    this.dpr = Math.max(1, window.devicePixelRatio || 1);
    this.particles = [];
    this.running = false;
    this.lastT = 0;
    this.resize();
    // single FX instance lives for page lifetime; listener intentionally never removed
    window.addEventListener('resize', () => this.resize());
  }
  resize(){
    const w = window.innerWidth, h = window.innerHeight;
    this.c.width = Math.floor(w * this.dpr);
    this.c.height = Math.floor(h * this.dpr);
    this.c.style.width = w + 'px';
    this.c.style.height = h + 'px';
    this.ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
  }
  emitFromElement(el, colors, count = 14){
    if(REDUCED_MOTION) return;
    if(!el) return;
    const r = el.getBoundingClientRect();
    const x = r.left + r.width / 2;
    const y = r.top + r.height / 2;
    this.emit(x, y, colors, count, Math.min(r.width, r.height) * 0.35);
  }
  emit(x, y, colors, count, radius = 8){
    if(REDUCED_MOTION) return;
    const now = performance.now();
    const P = CONFIG.particles;
    for(let i = 0; i < count; i++){
      const angle = Math.random() * Math.PI * 2;
      const cosA = Math.cos(angle), sinA = Math.sin(angle);
      const speed = P.speedMin + Math.random() * P.speedRange;
      const life  = P.lifeMin  + Math.random() * P.lifeRange;
      // spawn slightly off-center so they don't all start at one point
      const spawnR = Math.random() * radius;
      this.particles.push({
        x: x + cosA * spawnR,
        y: y + sinA * spawnR,
        vx: cosA * speed,
        vy: sinA * speed - P.upwardBias,
        born: now,
        life,
        color: colors[i % colors.length],
        size: P.sizeMin + Math.random() * P.sizeRange,
      });
    }
    if(!this.running) this.start();
  }
  start(){
    this.running = true;
    this.lastT = performance.now();
    requestAnimationFrame((t) => this.tick(t));
  }
  tick(now){
    const dt = Math.min((now - this.lastT) / 1000, 0.05);
    this.lastT = now;
    const w = this.c.width / this.dpr, h = this.c.height / this.dpr;
    this.ctx.clearRect(0, 0, w, h);
    this.ctx.globalCompositeOperation = 'lighter';
    const P = CONFIG.particles;
    const dragF = Math.pow(P.drag, dt);
    const remaining = [];
    for(const p of this.particles){
      const age = now - p.born;
      if(age >= p.life) continue;
      const t = age / p.life;
      // integrate with drag
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vx *= dragF;
      p.vy *= dragF;
      p.vy += P.gravity * dt;
      // alpha: linear ramp up to peak, then ramp back down across remaining life
      const alpha = t < P.alphaRise
        ? (t / P.alphaRise) * P.alphaPeak
        : (1 - (t - P.alphaRise) / (1 - P.alphaRise)) * P.alphaPeak;
      this.ctx.globalAlpha = Math.max(0, alpha);
      this.ctx.fillStyle = p.color;
      this.ctx.beginPath();
      this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      this.ctx.fill();
      remaining.push(p);
    }
    this.ctx.globalAlpha = 1;
    this.ctx.globalCompositeOperation = 'source-over';
    this.particles = remaining;
    if(this.particles.length > 0){
      requestAnimationFrame((t) => this.tick(t));
    } else {
      this.running = false;
    }
  }
}

const fx = new FX(document.getElementById('fx-canvas'));

function packPaletteOf(pack){
  if(!pack) return PARTICLE_PALETTES.multicolor;
  return PARTICLE_PALETTES[pack.color] || PARTICLE_PALETTES.multicolor;
}

/* combined-slots particle emission: interleave both palettes when both packs exist,
   else single palette, else fall back to white. used by reroll-all + copy buttons. */
function emitParticlesForSlots(el, count){
  const pals = state.slots.filter(p => p).map(p => packPaletteOf(p));
  const palette = pals.length === 2
    ? interleave(pals[0], pals[1])
    : (pals[0] || PARTICLE_PALETTES.white);
  fx.emitFromElement(el, palette, count);
}

/* ========== STATE & ROLL ========== */
/* activeSets: which jumpstart products contribute packs to the current PACKS
   union. seeded from localStorage with a legacy single-product fallback so users
   from the prior single-select build don't lose their preference. */
const state = {
  activeSets: (()=>{
    try {
      const raw = localStorage.getItem('jumpstart_sets');
      if(raw){ const arr = JSON.parse(raw); if(Array.isArray(arr) && arr.length) return arr; }
      const legacy = localStorage.getItem('jumpstart_product');
      if(legacy) return [legacy];
    } catch(e){}
    return ['JMP'];
  })(),
  slots: [null, null],
  locked: [false, false],
  animating: false,
  tintActive: { left: 1, right: 1 },
  atmosActive: { left: 1, right: 1 },
  // DEBUG: remove atmosDebug + window.__atmosDebug wiring on cleanup
  atmosDebug: { colorOverride: null, archOverride: null, paused: false, side: 'both', hideTints: false },
  hover: { currentKey: null, pendingPointer: null, pendingFrame: false },
};

/* tint update — true cross-fade between front/back layer per side.
   only setAttribute is used; no inline styles, no style.setProperty. */
function applyTintToSide(side, newColor){
  const cur = state.tintActive[side];
  const nxt = cur === 1 ? 2 : 1;
  const curEl = document.getElementById(`tint-${side}-${cur}`);
  const nxtEl = document.getElementById(`tint-${side}-${nxt}`);

  if(!newColor){
    curEl.removeAttribute('data-active');
    nxtEl.removeAttribute('data-active');
    return;
  }

  // already showing this exact color on the active layer → no-op
  if(curEl.hasAttribute('data-active') &&
     curEl.getAttribute('data-color') === newColor) return;

  // prep the idle layer with the new color, force reflow so the bg is committed
  // before opacity transition kicks in, then swap active flags simultaneously
  nxtEl.setAttribute('data-color', newColor);
  void nxtEl.offsetWidth;
  nxtEl.setAttribute('data-active', '');
  curEl.removeAttribute('data-active');
  state.tintActive[side] = nxt;
}

function updateTint(){
  const c0 = state.slots[0] ? state.slots[0].color : null;
  const c1 = state.slots[1] ? state.slots[1].color : null;
  applyTintToSide('left',  c0);
  applyTintToSide('right', c1);
}

/* ===== ATMOS: archetype detection + per-side cross-fade =====
   archetypeFor() maps pack.theme → motion family. order matters: more
   specific themes (chaos, sky, aquatic) are checked before generic ones
   (wild, default). first keyword hit wins. */
const ARCHETYPE_KEYWORDS = [
  ['chaos',   ['rainbow','chaos','multi-head','too many','treasure','land','eldraz']],
  ['sky',     ['angel','feather','cloud','soar','spirit','holy','fae','above','flying']],
  ['aquatic', ['pirate','sea','archae','milling','drown','coast','merfolk','ninja','illusion']],
  ['fire',    ['dragon','devil','fier','fire','goblin','smash','seism','burn','stok','zealot','warrior','raid','speed','spicy','lightning','chandra','minotaur','bloody','copied','too many']],
  ['undead',  ['vampire','reanim','discard','liliana','witch','spook','bone','demon','fang','gross','morbid','zombie','ghast','icky','cruel','unlucky','rat','nefar','grave','ne\'er','rogue']],
  ['arcane',  ['wizard','well-read','teferi','spell','scry','think','urza','inventiv','bookworm','surprise','basri','doctor','enchant','constellation','shapeshift','detective','go to school','scrying','snow']],
  ['metal',   ['armored','knight','vehicle','law','teamwork','armed','healer','hero','legion','prideful','stalwart','cleric','phyrex','minion','blink','wall','giddyap']],
  ['wild',    ['cat','dog','dino','elve','beast','predat','tree','garruk','primate','wolf','snake','insect','feroc','gigant','fun guy','explor','encounter','landfall','dinner','modified','plus one','unicorn','cycling','experimental','snake']],
];
function archetypeFor(theme){
  if(!theme) return 'default';
  const t = theme.toLowerCase();
  for(const [arch, keys] of ARCHETYPE_KEYWORDS){
    if(keys.some(k => t.includes(k))) return arch;
  }
  return 'default';
}

/* same cross-fade pattern as applyTintToSide — idle layer gets the new
   color+archetype, force reflow so styles commit before opacity transitions,
   then swap active flags simultaneously. null pack clears both layers. */
function applyAtmosToSide(side, pack){
  const cur = state.atmosActive[side];
  const nxt = cur === 1 ? 2 : 1;
  const curEl = document.getElementById(`atmos-${side}-${cur}`);
  const nxtEl = document.getElementById(`atmos-${side}-${nxt}`);
  if(!curEl || !nxtEl) return;

  if(!pack){
    curEl.removeAttribute('data-active');
    nxtEl.removeAttribute('data-active');
    return;
  }
  // debug override wins over real pack values when active
  const dbg = state.atmosDebug;
  const color = (dbg && dbg.colorOverride) || pack.color;
  const arch  = (dbg && dbg.archOverride)  || archetypeFor(pack.theme);

  if(curEl.hasAttribute('data-active') &&
     curEl.getAttribute('data-color')     === color &&
     curEl.getAttribute('data-archetype') === arch) return;

  nxtEl.setAttribute('data-color', color);
  nxtEl.setAttribute('data-archetype', arch);
  void nxtEl.offsetWidth;
  nxtEl.setAttribute('data-active', '');
  curEl.removeAttribute('data-active');
  state.atmosActive[side] = nxt;
}

function updateAtmos(){
  applyAtmosToSide('left',  state.slots[0]);
  applyAtmosToSide('right', state.slots[1]);
}

/* pick a random pack whose theme differs from excludeTheme (or any if null) */
function pickPackExcludingTheme(excludeTheme){
  const pool = excludeTheme ? PACKS.filter(p => p.theme !== excludeTheme) : PACKS;
  return randomOf(pool);
}

function rollAll(){
  if(state.animating) return;
  if(state.locked[0] && state.locked[1]) return;
  const willRoll = [!state.locked[0], !state.locked[1]];
  animateRoll(willRoll);
}

function rollSlot(idx){
  if(state.animating) return;
  if(state.locked[idx]) return;
  if(!state.slots[1-idx]){ animateRoll([true,true]); return; }
  const willRoll = [false,false];
  willRoll[idx] = true;
  animateRoll(willRoll);
}

/* ========== ANIMATION ========== */
/* preload one pack's emblem image into the browser cache. resolves when the
   image is ready (or after a safety timeout — we don't want a sluggish scryfall
   response to indefinitely freeze the reveal). cheap to call repeatedly: an
   already-warmed url short-circuits via PRELOADED_URLS. */
function preloadEmblem(pack, timeoutMs = 4000){
  if(!pack) return Promise.resolve();
  const url = EMBLEM_URLS[packKey(pack)];
  if(!url) return Promise.resolve();
  if(PRELOADED_URLS.has(url)) return Promise.resolve();
  return new Promise(resolve => {
    let done = false;
    const finish = () => { if(!done){ done = true; resolve(); } };
    loadImageWithRetry(url).then(() => {
      PRELOADED_URLS.add(url);
      finish();
    });
    // safety: never freeze the reveal stage waiting on a slow network
    setTimeout(finish, timeoutMs);
  });
}

function animateRoll(willRoll){
  state.animating = true;
  const stageInitial = document.getElementById('stage-initial');
  const stageReveal = document.getElementById('stage-reveal');
  stageInitial.classList.add('hidden');
  stageReveal.classList.add('active');
  document.getElementById('combined').classList.remove('show');
  hideHover();  // any pinned preview from the previous list is now stale

  const slots = [0,1];
  const packEls = [PACK_REFS[0].el, PACK_REFS[1].el];

  // precompute final picks so the "distinct themes" constraint holds
  const finals = [state.slots[0], state.slots[1]];
  if(willRoll[0] && willRoll[1]){
    finals[0] = pickPackExcludingTheme(null);
    finals[1] = pickPackExcludingTheme(finals[0].theme);
  } else if(willRoll[0]){
    finals[0] = pickPackExcludingTheme(finals[1].theme);
  } else if(willRoll[1]){
    finals[1] = pickPackExcludingTheme(finals[0].theme);
  }

  // stealth warm-up: fire emblem fetches in parallel with the reel. typical
  // scryfall response (200-800ms) finishes inside the 1.3s cycle, so settle
  // hits an already-cached image with no flash. slow responses delay the
  // reveal of that slot only (the safety timeout in preloadEmblem caps it).
  const emblemReady = [Promise.resolve(), Promise.resolve()];
  slots.forEach(i => {
    if(willRoll[i] && finals[i]) emblemReady[i] = preloadEmblem(finals[i]);
  });

  // strip color attrs so the slot looks neutral while reeling — avoids flicker on stripe/tag/tint
  slots.forEach(i=>{
    if(willRoll[i]){
      const refs = PACK_REFS[i];
      refs.el.classList.add('rolling');
      refs.el.removeAttribute('data-color');
      refs.el.classList.remove('multi');
      refs.tagEl.textContent = '';
      refs.metaEl.textContent = '';
      applyTintToSide(i === 0 ? 'left' : 'right', null);
      applyAtmosToSide(i === 0 ? 'left' : 'right', null);
    }
  });

  const start = performance.now();

  const settleSlot = async (i) => {
    // gate the visual reveal on this slot's emblem being cached. parallel to
    // the reel above, so usually instant. if the network is slow the reel
    // shake/flicker keeps going past cycleMs until the image arrives — that's
    // a feature: better one extra second of reel than a 2-second blank pack.
    await emblemReady[i];
    state.slots[i] = finals[i];
    packEls[i].classList.remove('rolling');
    packEls[i].classList.remove('settling');
    void packEls[i].offsetWidth;  // restart animation
    packEls[i].classList.add('settling');
    packEls[i].classList.add('settle');
    setTimeout(() => {
      packEls[i].classList.remove('settle');
      packEls[i].classList.remove('settling');
    }, CONFIG.roll.cleanupMs);
    renderPack(i, state.slots[i], { ghost: false });
    updateTint();
    updateAtmos();
  };

  const finishRoll = (delay) => {
    setTimeout(() => { state.animating = false; renderCombined(); }, delay);
  };

  const tick = () => {
    const elapsed = performance.now() - start;
    if(elapsed < CONFIG.roll.cycleMs){
      slots.forEach(i=>{
        if(willRoll[i]){
          const fake = randomOf(PACKS);
          renderPack(i, fake, { ghost: true });
        }
      });
      setTimeout(tick, CONFIG.roll.tickMs);
      return;
    }
    // reel duration elapsed — sequence settles, each awaits its emblem
    const rolling = slots.filter(i => willRoll[i]);
    if(rolling.length === 0){
      state.animating = false;
      renderCombined();
      return;
    }
    if(rolling.length === 1){
      settleSlot(rolling[0]).then(() => finishRoll(CONFIG.roll.afterSingleMs));
      return;
    }
    // two: settle first, then stagger, then settle second, then finish
    settleSlot(rolling[0])
      .then(() => sleep(CONFIG.roll.staggerMs))
      .then(() => settleSlot(rolling[1]))
      .then(() => finishRoll(CONFIG.roll.afterBothMs));
  };
  tick();
}

let EMBLEM_URLS = {};

/* tracks emblem urls already requested in this session. with the stealth
   preload (only 2 urls per roll), persistence across reloads no longer pays
   off — the browser's own HTTP cache (max-age=172800 on the api, ~1yr on the
   cdn) handles cross-session warm hits transparently. */
const PRELOADED_URLS = new Set();

/* build EMBLEM_URLS map (packKey → scryfall art_crop url). pure indexing pass:
   no network traffic; preloadEmblem() inside animateRoll is the only place
   that actually pings scryfall. */
function buildEmblemUrls(){
  EMBLEM_URLS = {};
  for(const pack of PACKS){
    const card = pack.emblemCard ? pack.cards.find(c => c.origName === pack.emblemCard || c.name === pack.emblemCard) : null;
    let set = null, cn = null;
    if(card && card.set && card.cn != null){ set = card.set; cn = card.cn; }
    else if(pack.emblemCard){
      // emblemCard might not be in pack.cards (e.g., themed-basic normalization).
      // fall back to the set's cardData directly.
      const cd = (SETS[pack.set] && SETS[pack.set].cardData) || {};
      const d = cd[pack.emblemCard];
      if(d){ set = d[0]; cn = d[1]; }
    }
    if(!set || cn == null) continue;
    EMBLEM_URLS[packKey(pack)] = `https://api.scryfall.com/cards/${set.toLowerCase()}/${cn}?format=image&version=art_crop`;
  }
}

/* sleep helper for staggered preloads */
function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

/* attempt to load a single image url with bounded retries on transient errors
   (429 rate-limit, network blips). resolves with `true` once the browser fires
   `load` for the url, regardless of which retry succeeded. */
function loadImageWithRetry(url, opts={}){
  const maxRetries = opts.maxRetries ?? 6;
  const baseDelay  = opts.baseDelay  ?? 600;   // ms; backoff base
  let attempt = 0;
  return new Promise(resolve => {
    const tryOnce = () => {
      const img = new Image();
      img.onload  = () => resolve(true);
      img.onerror = async () => {
        attempt++;
        if(attempt > maxRetries) return resolve(false);
        // exponential backoff with jitter; soft enough to never DOS scryfall
        const delay = baseDelay * Math.pow(1.6, attempt-1) + Math.random()*120;
        await sleep(delay);
        tryOnce();
      };
      img.src = url;
    };
    tryOnce();
  });
}

/* fill the home hero mosaic. take a small sample (MOSAIC_SAMPLE) of the active
   product's emblems, build a 9×7 base block by cycling that sample, then lay
   out 18×14 cells where cell (r,c) sources base[(r%7)*9 + (c%9)]. the doubled
   layout makes the right half match the left and the bottom half match the
   top → the @keyframes diagonal translate loops without a visible seam.
   the sample size caps how many concurrent Scryfall requests the mosaic
   triggers so we never trip the rate limiter. on product switch the existing
   track is removed before rebuild. */
const MOSAIC_SAMPLE = 24;
function fillHeroMosaic(){
  const host = document.getElementById('hero-mosaic');
  if(!host) return;
  host.innerHTML = '';
  const urls = Object.values(EMBLEM_URLS);
  if(!urls.length) return;
  // shuffle then slice; cycles to fill the 9×7 base if fewer than 63 picks
  const pool = urls.slice().sort(() => Math.random() - 0.5).slice(0, MOSAIC_SAMPLE);
  const baseCols = 9, baseRows = 7;
  const base = [];
  for(let i = 0; i < baseCols * baseRows; i++) base.push(pool[i % pool.length]);
  const totalCols = baseCols * 2, totalRows = baseRows * 2;
  const track = document.createElement('div');
  track.className = 'hero-mosaic-track';
  const frag = document.createDocumentFragment();
  for(let r = 0; r < totalRows; r++){
    for(let c = 0; c < totalCols; c++){
      const img = document.createElement('img');
      img.src = base[(r % baseRows) * baseCols + (c % baseCols)];
      img.loading = 'lazy';
      img.decoding = 'async';
      img.alt = '';
      frag.appendChild(img);
    }
  }
  track.appendChild(frag);
  host.appendChild(track);
}

/* JMP 2020 snapshot — wires the literals declared above into SETS so all three
   products share the same access pattern (SETS[code].cardData etc.). */
SETS.JMP = {
  label: 'Jumpstart 2020',
  badge: 'JMP',
  year:  2020,
  basics: JMP_BASICS_JMP,
  rawMarkdown: RAW_MARKDOWN_JMP,
  cardData: CARD_DATA_JMP,
  creatures: CREATURE_NAMES_JMP,
  packEmblem: PACK_EMBLEM_JMP,
  packRarity: PACK_RARITY_JMP,
  themeDescriptions: THEME_DESCRIPTIONS_JMP,
};

/* product list in display order (oldest → newest) */
const PRODUCT_ORDER = ['JMP','J22','J25'];

/* swap to a given multi-set selection: rebuild PACKS as the union of the
   selected products' parsed packs, refresh EMBLEM_URLS + mosaic, optionally
   reset slots/stage on a mid-session change. no network: emblems are warmed
   lazily inside animateRoll for the two packs that actually land. */
function loadProducts(codes, opts){
  opts = opts || {};
  codes = [...new Set(codes)].filter(c => SETS[c]);
  if(!codes.length) codes = ['JMP'];
  // canonical ordering keeps PACKS deterministic regardless of click order
  codes.sort((a,b) => PRODUCT_ORDER.indexOf(a) - PRODUCT_ORDER.indexOf(b));
  state.activeSets = codes;
  try { localStorage.setItem('jumpstart_sets', JSON.stringify(codes)); } catch(e){}

  PACKS = [];
  for(const code of codes){
    const s = SETS[code];
    const setPacks = parseMarkdown(s.rawMarkdown, code);
    PACKS.push(...setPacks);
  }
  buildEmblemUrls();
  fillHeroMosaic();

  if(!opts.initial){
    /* hot-swap mid-session: discard current slots, return user to the home stage.
       slots cleared first so renderCombined() won't re-emit stale lines. */
    state.slots = [null, null];
    state.locked = [false, false];
    state.animating = false;
    const stageReveal = document.getElementById('stage-reveal');
    const stageInitial = document.getElementById('stage-initial');
    if(stageReveal) stageReveal.classList.remove('active');
    if(stageInitial) stageInitial.classList.remove('hidden');
    const combined = document.getElementById('combined');
    if(combined) combined.classList.remove('show');
    [0,1].forEach(i=>{
      const el = document.getElementById('pack-'+i);
      if(el){
        el.removeAttribute('data-color');
        el.classList.remove('multi','rolling','settling','settle');
        const nameEl = el.querySelector('[data-name]'); if(nameEl) nameEl.textContent = '—';
        const tagEl  = el.querySelector('[data-tag]');  if(tagEl)  tagEl.textContent  = '';
        const metaEl = el.querySelector('[data-meta]'); if(metaEl) metaEl.textContent = '';
        const rarEl  = el.querySelector('.pack-rarity'); if(rarEl) rarEl.removeAttribute('data-rarity');
        el.style.setProperty('--emblem-bg','none');
      }
    });
    updateTint();
    updateAtmos();
    if(typeof hideHover === 'function') hideHover();
    updateLockUI();
  }
  renderProductSelector();
  // emblem warm-up is deferred to ROLL time (see preloadEmblem inside
  // animateRoll). users get an instant home stage with chips + mosaic; the
  // network cost is paid only for the two packs that actually land.
}

function renderProductSelector(){
  const host = document.getElementById('product-selector');
  if(!host) return;
  const active = new Set(state.activeSets || []);
  for(const btn of host.querySelectorAll('.product-btn')){
    const on = active.has(btn.dataset.code);
    btn.classList.toggle('active', on);
    btn.setAttribute('aria-pressed', on ? 'true' : 'false');
  }
}


/* packKey: stable identifier for a pack across sets. used to key EMBLEM_URLS
   since multiple sets can ship a pack with the same display name (e.g., JMP's
   "dragons (1)" vs J22's "dragons (1)"). */
function packKey(pack){ return pack.set + ':' + pack.name; }

function renderPack(idx, pack, opts={}){
  const refs = PACK_REFS[idx];
  refs.nameEl.textContent = pack.name.toUpperCase();
  if(opts.ghost) return;  // rolling cycle: only the name flicker, no color/tag/meta churn
  refs.el.dataset.color = pack.color || '';
  refs.el.classList.toggle('multi', pack.color === 'multicolor');
  refs.tagEl.textContent = COLOR_LABELS[pack.color] || '';
  refs.metaEl.textContent = pack.description || '';
  if(pack.rarity){ refs.rarityEl.setAttribute('data-rarity', pack.rarity); refs.rarityEl.title = RARITY_LABELS[pack.rarity]; }
  else { refs.rarityEl.removeAttribute('data-rarity'); refs.rarityEl.title = ''; }
  const emblem = EMBLEM_URLS[packKey(pack)];
  refs.el.style.setProperty('--emblem-bg', emblem ? `url("${emblem}")` : 'none');
}

function consolidate(a, b){
  // cards arrive pre-resolved from parseMarkdown (each has set/cn/mc/cmc baked in).
  // grouping by name flattens cross-set duplicates (e.g., Plains showing up from
  // a JMP pack and a J22 pack) — the first occurrence's set/cn wins for export.
  const qty = new Map();
  const meta = new Map();
  for(const card of [...a.cards, ...b.cards]){
    const key = card.name;
    if(qty.has(key)) qty.set(key, qty.get(key) + card.qty);
    else { qty.set(key, card.qty); meta.set(key, card); }
  }
  // lands (empty mana_cost) sink; spells sort by cmc asc then alpha
  const entries = [...qty.keys()].map(n => ({ name:n, qty:qty.get(n), m:meta.get(n) }));
  const isLand = (e) => !e.m.mc;
  const spells = entries.filter(e => !isLand(e)).sort((a,b) => a.m.cmc - b.m.cmc || a.name.localeCompare(b.name));
  const lands  = entries.filter(e =>  isLand(e)).sort((a,b) => {
    const av = BASIC_VANILLA.has(a.name), bv = BASIC_VANILLA.has(b.name);
    if(av !== bv) return av ? 1 : -1;  // non-basic lands before basics
    return a.name.localeCompare(b.name);
  });
  return [...spells, ...lands].map(e => ({
    qty:        e.qty,
    name:       e.name,
    cn:         e.m.cn,
    set:        e.m.set,
    mc:         e.m.mc,
    cmc:        e.m.cmc,
    isCreature: !!e.m.isCreature,
    basic:      BASIC_VANILLA.has(e.name),
  }));
}

function renderCombined(){
  const [a,b] = state.slots;
  if(!a || !b) return;
  const cards = consolidate(a, b);
  const total = cards.reduce((s,c)=>s+c.qty,0);
  document.getElementById('card-count').textContent = `${total} cartas · ${cards.length} únicas`;
  renderDeckInsights(cards);

  const grid = document.getElementById('card-grid');
  grid.innerHTML = '';
  for(const c of cards){
    const row = document.createElement('div');
    row.className = 'card-row' + (c.basic ? ' basic' : '');
    if(c.set && c.cn !== null){
      row.dataset.set = c.set;
      row.dataset.cn = c.cn;
    }
    row.innerHTML = `<span class="card-qty">${c.qty}</span><span class="card-name">${escapeHtml(c.name)}</span><span class="card-mana">${manaCostHtml(c.mc)}</span>`;
    grid.appendChild(row);
  }
  document.getElementById('combined').classList.add('show');
}

/* deck insights: avg cmc (excluding lands) + creature/spell/land counts,
   plus a stacked-bar curve over cmc buckets 0..7+. cards comes from consolidate(). */
const CMC_BUCKET_MAX = 7;                          // cards with cmc >= 7 collapse into the last bucket
const CMC_BUCKET_COUNT = CMC_BUCKET_MAX + 1;       // buckets indexed 0..CMC_BUCKET_MAX inclusive
function renderDeckInsights(cards){
  const buckets = Array.from({length:CMC_BUCKET_COUNT}, () => ({ creature:0, spell:0 }));
  let creatures = 0, spells = 0, lands = 0;
  let cmcSum = 0, nonLandQty = 0;
  for(const c of cards){
    if(isLand(c)){ lands += c.qty; continue; }
    if(c.isCreature) creatures += c.qty; else spells += c.qty;
    cmcSum += c.cmc * c.qty;
    nonLandQty += c.qty;
    const idx = Math.min(c.cmc, CMC_BUCKET_MAX);
    buckets[idx][c.isCreature ? 'creature' : 'spell'] += c.qty;
  }
  const avg = nonLandQty ? (cmcSum / nonLandQty) : 0;

  const statsEl = document.getElementById('deck-stats');
  statsEl.innerHTML =
    `<span class="stat-item"><span class="stat-label">cmc</span><span class="stat-value">${avg.toFixed(2)}</span></span>` +
    `<span class="stat-item"><span class="stat-label">criat</span><span class="stat-value">${creatures}</span></span>` +
    `<span class="stat-item"><span class="stat-label">hech</span><span class="stat-value">${spells}</span></span>` +
    `<span class="stat-item"><span class="stat-label">lands</span><span class="stat-value">${lands}</span></span>`;

  const max = Math.max(1, ...buckets.map(b => b.creature + b.spell));
  const curveEl = document.getElementById('mana-curve');
  curveEl.innerHTML = buckets.map((b, i) => {
    const tot = b.creature + b.spell;
    const cPct = (b.creature / max) * 100;
    const sPct = (b.spell    / max) * 100;
    return `<div class="curve-col">`
         + `<span class="curve-count">${tot || ''}</span>`
         + `<div class="curve-stack">`
         +   `<div class="curve-creature" style="height:${cPct}%"></div>`
         +   `<div class="curve-spell" style="height:${sPct}%"></div>`
         + `</div>`
         + `<span class="curve-label">${i === CMC_BUCKET_MAX ? CMC_BUCKET_MAX+'+' : i}</span>`
         + `</div>`;
  }).join('');
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, ch => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[ch]));
}

/* parse "{2}{W}{U}" → mana-font <i> tags. handles hybrid ({W/U} → ms-wu),
   twobrid ({2/W} → ms-2w), phyrexian ({W/P} → ms-wp), tap ({T} → ms-tap), etc. */
function manaCostHtml(mc){
  if(!mc) return '';
  return mc.replace(/\{([^}]+)\}/g, (_, sym) => {
    const cls = sym.toLowerCase().replace(/\//g, '');
    return `<i class="ms ms-${cls} ms-cost"></i>`;
  });
}

function exportText(){
  const [a,b] = state.slots;
  if(!a || !b) return '';
  const cards = consolidate(a, b);
  return cards.map(c =>
    c.cn !== null ? `${c.qty} ${c.name} (${c.set}) ${c.cn}` : `${c.qty} ${c.name}`
  ).join('\n');
}

document.getElementById('roll-main').addEventListener('click', (e)=>{
  fx.emitFromElement(e.currentTarget, PARTICLE_PALETTES.white, 18);
  rollAll();
});

document.getElementById('reroll-all').addEventListener('click', (e)=>{
  emitParticlesForSlots(e.currentTarget, 16);
  state.locked = [false, false];
  updateLockUI();
  rollAll();
});

function showCopiedFeedback(btn, restoreLabel){
  btn.textContent = 'COPIADO';
  btn.classList.add('copied');
  setTimeout(()=>{ btn.textContent = restoreLabel; btn.classList.remove('copied'); }, CONFIG.copyToastMs);
}

document.getElementById('copy-btn').addEventListener('click', async (e)=>{
  emitParticlesForSlots(e.currentTarget, 20);
  const txt = exportText();
  const btn = e.currentTarget;
  try {
    await navigator.clipboard.writeText(txt);
    showCopiedFeedback(btn, btn.textContent);
  } catch(e){
    // fallback for non-secure contexts / older browsers without Clipboard API
    const ta = document.createElement('textarea');
    ta.value = txt; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    showCopiedFeedback(btn, 'COPIAR LISTA COMBINADA');
  }
});

/* cached refs — hot paths (renderPack, animateRoll, updateLockUI) avoid re-querying */
const PACK_REFS = [0,1].map(idx => {
  const el = document.getElementById('pack-'+idx);
  return {
    el,
    nameEl:    el.querySelector('[data-name]'),
    tagEl:     el.querySelector('[data-tag]'),
    metaEl:    el.querySelector('[data-meta]'),
    rarityEl:  el.querySelector('.pack-rarity'),
    lockBtn:   el.querySelector('[data-action="lock"]'),
    rerollBtn: el.querySelector('[data-action="reroll"]'),
  };
});

PACK_REFS.forEach((refs, idx) => {
  refs.lockBtn.addEventListener('click', (e)=>{
    if(!state.slots[idx]) return;
    fx.emitFromElement(e.currentTarget, packPaletteOf(state.slots[idx]), 12);
    state.locked[idx] = !state.locked[idx];
    updateLockUI();
  });
  refs.rerollBtn.addEventListener('click', (e)=>{
    if(state.slots[idx]) fx.emitFromElement(e.currentTarget, packPaletteOf(state.slots[idx]), 12);
    rollSlot(idx);
  });
});

function updateLockUI(){
  PACK_REFS.forEach((refs, idx) => {
    if(state.locked[idx]){
      refs.lockBtn.classList.add('locked');
      refs.lockBtn.textContent = 'LOCKED';
    } else {
      refs.lockBtn.classList.remove('locked');
      refs.lockBtn.textContent = 'LOCK';
    }
  });
}

/* keyboard: space/enter to roll */
window.addEventListener('keydown', e=>{
  if(e.code === 'Space' || e.code === 'Enter'){
    if(document.activeElement && ['BUTTON','INPUT','TEXTAREA'].includes(document.activeElement.tagName)) return;
    e.preventDefault();
    rollAll();
  }
});

/* ========== HOVER CARD PREVIEW ==========
   on hover of a card row, fetch the card image from scryfall via
   /cards/{set}/{cn}?format=image and float it near the cursor.
   browser HTTP cache makes repeat hovers instant. */
/* height derives from MTG card aspect ratio (488x680 art_crop) — matches CSS aspect-ratio on #hover-preview */
const MTG_CARD_ASPECT = 680 / 488;
const HOVER_H = Math.round(CONFIG.hover.width * MTG_CARD_ASPECT);

const hoverImg = document.createElement('img');
hoverImg.id = 'hover-preview';
hoverImg.alt = '';
document.body.appendChild(hoverImg);

function hoverImageUrl(set, cn){
  return `https://api.scryfall.com/cards/${encodeURIComponent(set.toLowerCase())}/${encodeURIComponent(cn)}?format=image&version=normal`;
}

function showHoverFor(row, x, y){
  const set = row.dataset.set;
  const cn  = row.dataset.cn;
  if(!set || !cn) return;
  const key = `${set}/${cn}`;
  // dedup guard prevents `loaded` flicker on same-card mousemove between rows
  if(state.hover.currentKey !== key){
    state.hover.currentKey = key;
    hoverImg.classList.remove('loaded');
    hoverImg.src = hoverImageUrl(set, cn);
  }
  hoverImg.classList.add('show');
  positionHover(x, y);
}

function hideHover(){
  hoverImg.classList.remove('show','loaded');
  state.hover.currentKey = null;
}

function positionHover(x, y){
  const W = CONFIG.hover.width, M = CONFIG.hover.margin, E = CONFIG.hover.edge;
  let left = x + M;
  if(left + W > window.innerWidth - E) left = x - W - M;
  if(left < E) left = E;
  let top = y - HOVER_H / 2;
  if(top < E) top = E;
  if(top + HOVER_H > window.innerHeight - E) top = window.innerHeight - HOVER_H - E;
  hoverImg.style.left = left + 'px';
  hoverImg.style.top  = top  + 'px';
}

function schedulePosition(x, y){
  state.hover.pendingPointer = { x, y };
  if(state.hover.pendingFrame) return;
  state.hover.pendingFrame = true;
  requestAnimationFrame(() => {
    state.hover.pendingFrame = false;
    if(state.hover.pendingPointer && state.hover.currentKey){
      positionHover(state.hover.pendingPointer.x, state.hover.pendingPointer.y);
    }
  });
}

hoverImg.addEventListener('load', () => hoverImg.classList.add('loaded'));

const cardGrid = document.getElementById('card-grid');
cardGrid.addEventListener('mouseover', (e) => {
  const row = e.target.closest('.card-row');
  if(row && row.dataset.set) showHoverFor(row, e.clientX, e.clientY);
});
cardGrid.addEventListener('mousemove', (e) => {
  if(!state.hover.currentKey) return;
  const row = e.target.closest('.card-row');
  if(!row || !row.dataset.set){ hideHover(); return; }
  schedulePosition(e.clientX, e.clientY);
}, { passive: true });
cardGrid.addEventListener('mouseleave', hideHover);

/* ========== PRODUCT SELECTOR ==========
   wire chips on the home stage to loadProducts(). each click toggles one set
   in/out (min 1 set; if you uncheck the last one, the click is ignored to
   keep at least one active). no network: emblems are warmed on-demand inside
   animateRoll for the two packs actually rolled. */
(function initProductSelector(){
  const host = document.getElementById('product-selector');
  if(host){
    host.addEventListener('click', (e)=>{
      const btn = e.target.closest('.product-btn');
      if(!btn) return;
      const code = btn.dataset.code;
      if(!code || !SETS[code]) return;
      if(state.animating) return;  // ignore mid-roll changes
      const current = new Set(state.activeSets);
      const willRemove = current.has(code);
      // enforce min 1: silently ignore unchecking the last active set
      if(willRemove && current.size === 1) return;
      if(willRemove) current.delete(code); else current.add(code);
      fx.emitFromElement(btn, PARTICLE_PALETTES.white, 14);
      loadProducts([...current]);
    });
  }
  // sanitize stored selection: drop any unknown codes; ensure at least one
  state.activeSets = (state.activeSets || []).filter(c => SETS[c]);
  if(!state.activeSets.length) state.activeSets = ['JMP'];
  // initial paint: build packs + mosaic synchronously, no network. emblems
  // are stealth-warmed inside animateRoll for the two packs that actually land.
  loadProducts(state.activeSets, { initial: true });
})();

/* ===== DEBUG: atmos panel wiring — remove block on cleanup ===== */
(function(){
  const root = document.documentElement;
  const panel = document.createElement('div');
  panel.id = 'atmos-debug';
  panel.className = 'hidden';
  panel.innerHTML = `
    <header>

    </header>

        </div>
      </div>
      <div class="ad-row">
