        <div class="ad-chips" data-group="arch">
          <button type="button" data-arch="" class="active">—</button>
          <button type="button" data-arch="sky">sky</button>
          <button type="button" data-arch="fire">fire</button>
          <button type="button" data-arch="undead">undead</button>
          <button type="button" data-arch="aquatic">aquatic</button>
          <button type="button" data-arch="wild">wild</button>
          <button type="button" data-arch="arcane">arcane</button>
          <button type="button" data-arch="metal">metal</button>
          <button type="button" data-arch="chaos">chaos</button>
          <button type="button" data-arch="default">default</button>
        </div>
      </div>
      <div class="ad-row">
        <label>blur <output id="ad-blur-val">90</output>px</label>
        <input type="range" id="ad-blur" min="0" max="200" value="90">
      </div>
      <div class="ad-row">
        <label>speed <output id="ad-speed-val">1.09</output>x</label>
        <input type="range" id="ad-speed" min="25" max="300" value="109">
      </div>
      <div class="ad-row">
        <label>opacity <output id="ad-opa-val">0.56</output></label>
        <input type="range" id="ad-opa" min="0" max="100" value="56">
      </div>
      <div class="ad-row">
        <label>blend</label>
        <div class="ad-chips" data-group="blend">
          <button type="button" data-blend="screen">screen</button>
          <button type="button" data-blend="lighter">lighter</button>
          <button type="button" data-blend="overlay" class="active">overlay</button>
          <button type="button" data-blend="normal">normal</button>
        </div>
      </div>
      <div class="ad-row">
        <label><input type="checkbox" id="ad-hide-tints"> hide tints</label>
        <label><input type="checkbox" id="ad-hide-mosaic"> hide mosaic</label>
        <label><input type="checkbox" id="ad-atmos-off"> atmos off</label>
        <label><input type="checkbox" id="ad-paused"> pause anim</label>
      </div>
      <div class="ad-bottom">
        <button type="button" id="ad-preview">preview</button>
        <button type="button" id="ad-reset">reset</button>
      </div>
    </div>`;
  document.body.appendChild(panel);

  const dbg = state.atmosDebug;
  // bypass pack lookup: write color+arch straight to the layer (idle gets it,
  // cross-fade as usual). lets the panel preview any combo without a real roll.
  function forceAtmos(side, color, archetype){
    const cur = state.atmosActive[side];
    const nxt = cur === 1 ? 2 : 1;
    const curEl = document.getElementById(`atmos-${side}-${cur}`);
    const nxtEl = document.getElementById(`atmos-${side}-${nxt}`);
    if(!curEl || !nxtEl) return;
    if(!color){
      curEl.removeAttribute('data-active');
      nxtEl.removeAttribute('data-active');
      return;
    }
    nxtEl.setAttribute('data-color', color);
    nxtEl.setAttribute('data-archetype', archetype || 'default');
    void nxtEl.offsetWidth;
    nxtEl.setAttribute('data-active', '');
    curEl.removeAttribute('data-active');
    state.atmosActive[side] = nxt;
  }
  function targetSides(){
    return dbg.side === 'both' ? ['left','right'] : [dbg.side];
  }
  function applyOverride(){
    // if either override is set we paint directly. otherwise revert to whatever
    // the real slots say (slot null → cleared layer).
    const sides = targetSides();
    if(dbg.colorOverride){
      sides.forEach(s => forceAtmos(s, dbg.colorOverride, dbg.archOverride || 'default'));
    } else if(dbg.archOverride){
      // arch-only: keep slot color if available, else white as a placeholder
      sides.forEach(s => {
        const sIdx = s === 'left' ? 0 : 1;
        const pk = state.slots[sIdx];
        forceAtmos(s, pk ? pk.color : 'white', dbg.archOverride);
      });
    } else {
      updateAtmos();
    }
  }
  function setActive(group, value){
    panel.querySelectorAll(`.ad-chips[data-group="${group}"] button`).forEach(b => {
      const v = b.getAttribute(`data-${group}`) || '';
      b.classList.toggle('active', v === value);
    });
  }
  // chip handlers
  panel.querySelectorAll('.ad-chips[data-group="side"] button').forEach(b => {
    b.addEventListener('click', () => {
      dbg.side = b.dataset.side;
      setActive('side', dbg.side);
    });
  });
  panel.querySelectorAll('.ad-chips[data-group="color"] button').forEach(b => {
    b.addEventListener('click', () => {
      dbg.colorOverride = b.dataset.color || null;
      setActive('color', b.dataset.color || '');
      applyOverride();
    });
  });
  panel.querySelectorAll('.ad-chips[data-group="arch"] button').forEach(b => {
    b.addEventListener('click', () => {
      dbg.archOverride = b.dataset.arch || null;
      setActive('arch', b.dataset.arch || '');
      applyOverride();
    });
  });
  panel.querySelectorAll('.ad-chips[data-group="blend"] button').forEach(b => {
    b.addEventListener('click', () => {
      root.style.setProperty('--atmos-blend', b.dataset.blend);
      setActive('blend', b.dataset.blend);
    });
  });
  // sliders
  const blurIn = panel.querySelector('#ad-blur');
  const blurOut = panel.querySelector('#ad-blur-val');
  blurIn.addEventListener('input', () => {
    root.style.setProperty('--atmos-blur', blurIn.value + 'px');
    blurOut.textContent = blurIn.value;
  });
  const speedIn = panel.querySelector('#ad-speed');
  const speedOut = panel.querySelector('#ad-speed-val');
  speedIn.addEventListener('input', () => {
    const mult = speedIn.value / 100;
    root.style.setProperty('--atmos-speed', mult);
    speedOut.textContent = mult.toFixed(2);
  });
  const opaIn = panel.querySelector('#ad-opa');
  const opaOut = panel.querySelector('#ad-opa-val');
  opaIn.addEventListener('input', () => {
    const v = opaIn.value / 100;
    root.style.setProperty('--atmos-opa', v);
    opaOut.textContent = v.toFixed(2);
  });
  // checkboxes
  panel.querySelector('#ad-hide-tints').addEventListener('change', e => {
    document.body.classList.toggle('dbg-hide-tints', e.target.checked);
  });
  panel.querySelector('#ad-hide-mosaic').addEventListener('change', e => {
    document.body.classList.toggle('dbg-hide-mosaic', e.target.checked);
  });
  panel.querySelector('#ad-atmos-off').addEventListener('change', e => {
    document.body.classList.toggle('dbg-atmos-off', e.target.checked);
  });
  panel.querySelector('#ad-paused').addEventListener('change', e => {
    document.querySelectorAll('.atmos').forEach(el => el.classList.toggle('is-paused', e.target.checked));
  });
  // preview button — cycle through all 9 archetypes on both sides for 2s each
  panel.querySelector('#ad-preview').addEventListener('click', () => {
    const archs = ['sky','fire','undead','aquatic','wild','arcane','metal','chaos','default'];
    const colors = ['white','blue','black','red','green','multicolor'];
    let i = 0;
    const tick = () => {
      if(i >= archs.length) return;
      const a = archs[i], c = colors[i % colors.length];
      forceAtmos('left',  c, a);
      forceAtmos('right', colors[(i+3) % colors.length], a);
      i++;
      setTimeout(tick, 1800);
    };
    tick();
  });
  // reset
  panel.querySelector('#ad-reset').addEventListener('click', () => {
    dbg.colorOverride = null;
    dbg.archOverride = null;
    dbg.side = 'both';
    // reset = drop the inline override, fall back to :root defaults (90/1.09/0.56/overlay)
    root.style.removeProperty('--atmos-blur');
    root.style.removeProperty('--atmos-speed');
    root.style.removeProperty('--atmos-opa');
    root.style.removeProperty('--atmos-blend');
    blurIn.value = 90;   blurOut.textContent = '90';
    speedIn.value = 109; speedOut.textContent = '1.09';
    opaIn.value = 56;    opaOut.textContent = '0.56';
    setActive('color', '');
    setActive('arch', '');
    setActive('side', 'both');
    setActive('blend', 'overlay');
    ['ad-hide-tints','ad-hide-mosaic','ad-atmos-off','ad-paused'].forEach(id => {
      panel.querySelector('#'+id).checked = false;
    });
    document.body.classList.remove('dbg-hide-tints','dbg-hide-mosaic','dbg-atmos-off');
    document.querySelectorAll('.atmos').forEach(el => el.classList.remove('is-paused'));
    updateAtmos();
  });
  // header toggle (collapse / expand)
  panel.querySelector('header').addEventListener('click', e => {
    if(e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
    panel.classList.toggle('collapsed');
  });
  panel.querySelector('.ad-x').addEventListener('click', e => {
    e.stopPropagation();
    panel.classList.toggle('hidden');
  });
  // hotkey: B toggles the panel. ignored when typing in an input/textarea
  // or when a modifier is held (so it doesn't fight browser shortcuts).
  window.addEventListener('keydown', e => {
    if(e.key !== 'b' && e.key !== 'B') return;
    if(e.ctrlKey || e.metaKey || e.altKey) return;
    const tag = (document.activeElement || {}).tagName;
    if(tag === 'INPUT' || tag === 'TEXTAREA') return;
    panel.classList.toggle('hidden');
  });
  // expose for console tinkering
  window.__atmos = { forceAtmos, applyOverride, dbg, archetypeFor };
})();
/* ===== END DEBUG ===== */
</script>
